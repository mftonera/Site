<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustavo Campos - SINC</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        .profile-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 4rem;
            align-items: start;
        }

        @media (max-width: 768px) {
            .profile-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        .profile-img-container {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--color-primary);
            box-shadow: 0 0 30px rgba(182, 37, 50, 0.2);
        }

        .profile-img-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .profile-info h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .profile-role {
            font-size: 1.2rem;
            color: var(--color-primary);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .profile-bio {
            color: var(--color-text-muted);
            line-height: 1.8;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-text);
            text-decoration: none;
            margin-bottom: 3rem;
            font-weight: 500;
            transition: color var(--transition-fast);
        }

        .back-btn:hover {
            color: var(--color-primary);
        }

        .social-icon-link {
            color: var(--color-text);
            transition: color var(--transition-fast);
        }

        .social-icon-link:hover {
            color: var(--color-primary);
        }
    </style>
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>

<body>
    <header
        style="padding: 2rem; display: flex; align-items: center; justify-content: center; background: rgba(10, 10, 10, 0.5); border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
        <img src="assets/icone.png" alt="SINC Icon" style="height: 35px; margin-right: 12px;">
        <span style="font-size: 1.5rem; font-weight: 800; letter-spacing: 1px;">SINC</span>
    </header>
    <main class="container" style="padding: 4rem 2rem; min-height: 80vh;">
        <a href="index.html#members" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Voltar para a Equipe
        </a>
        <div class="profile-grid">
            <div class="profile-img-container">
                <div
                    style="width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; background: #2A2A2A; font-size: 4rem; color: #555;">
                    FT</div>
            </div>
            <div class="profile-info">
                <h1>Gustavo Campos</h1>
                <p class="profile-role">Comercial • CONSULTOR</p>
                <div class="profile-bio">
                    <p>Informações detalhadas sobre Gustavo Campos em breve. Esta área será dedicada para descrever a
                        trajetória, as habilidades e as responsabilidades do membro dentro da SINC.</p>
                </div>
                <div class="social-links" style="display: flex; gap: 1.5rem; margin-top: 2rem;">
                    <a href="https://www.linkedin.com/in/gustavo-campos-764973235/" target="_blank"
                        class="social-icon-link" title="LinkedIn">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z">
                            </path>
                            <rect x="2" y="9" width="4" height="12"></rect>
                            <circle cx="4" cy="4" r="2"></circle>
                        </svg>
                    </a>
                    <a href="https://www.instagram.com/_gughs/" target="_blank" class="social-icon-link"
                        title="Instagram">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
